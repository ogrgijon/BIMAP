name: Build and Release (Windows x64 Portable EXE)

# Fires when a version tag is pushed: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build-windows-portable:
    name: PyInstaller onefile -> GitHub Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build portable BIMAP.exe (onefile)
        shell: pwsh
        run: |
          pyinstaller installer/bimap_portable.spec `
            --distpath installer/dist `
            --workpath installer/build `
            --noconfirm

      - name: Rename exe with version tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $src = "installer\dist\BIMAP.exe"
          $dst = "BIMAP-${tag}-windows-x64-portable.exe"
          Move-Item $src $dst
          Add-Content $env:GITHUB_ENV "EXE_NAME=$dst"

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          name: "BIMAP ${{ github.ref_name }}"
          body: |
            ## BIMAP ${{ github.ref_name }} - Windows x64 Portable

            **No installation required.** Download and double-click BIMAP.exe.

            ### System requirements
            - Windows 10 / 11 (x64)
            - No Python or runtime installation needed

            ### First launch note
            Windows SmartScreen may show an "Unknown publisher" warning.
            Click **More info** then **Run anyway** to proceed.

            ### User data
            Projects and tile cache are stored in `%USERPROFILE%\.bimap\`
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: ${{ env.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
